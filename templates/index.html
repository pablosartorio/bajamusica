<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonido · YouTube Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="grain"></div>

    <header class="masthead">
        <button class="history-trigger" id="historyBtn" title="Ver historial de descargas">Historial</button>
        <div class="wordmark">
            <span class="wordmark__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13"></path>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="18" cy="16" r="3"></circle>
                </svg>
            </span>
            <h1>Sonido</h1>
        </div>
        <p class="tagline">Buscá, elegí, y bajá a tu carpeta de música.</p>
    </header>

    <main class="shell">
        <!-- Búsqueda -->
        <section class="searchbar">
            <input
                type="text"
                id="query"
                class="searchbar__input"
                placeholder="Ej: canciones de Pescetti"
                autocomplete="off"
                spellcheck="false">
            <button id="searchBtn" class="searchbar__btn">
                <span class="btn-label">Buscar</span>
                <span class="spinner" aria-hidden="true"></span>
            </button>
        </section>

        <!-- Controles -->
        <section class="controls" id="controls" hidden>
            <div class="control-group">
                <span class="control-label">Formato</span>
                <div class="segmented" id="formatToggle">
                    <button class="seg is-active" data-format="mp3">MP3</button>
                    <button class="seg" data-format="mp4">MP4</button>
                </div>
            </div>

            <div class="control-group">
                <span class="control-label">Calidad</span>
                <div class="segmented" id="qualityToggle">
                    <button class="seg is-active" data-quality="high">Alta</button>
                    <button class="seg" data-quality="medium">Media</button>
                    <button class="seg" data-quality="low">Baja</button>
                </div>
            </div>

            <div class="control-group">
                <span class="control-label">Nombre</span>
                <div class="segmented" id="namingToggle">
                    <button class="seg is-active" data-naming="youtube">YouTube</button>
                    <button class="seg" data-naming="artist_title">Artista · Título</button>
                    <button class="seg" data-naming="artist_album_title">Artista · Álbum · Título</button>
                </div>
            </div>

            <button class="ghost-btn" id="selectAllBtn">Seleccionar todo</button>

            <div class="control-row-full">
                <span class="control-label">Carpeta</span>
                <input type="text" id="destDir" class="control-input"
                       value="{{ default_dir }}" placeholder="{{ default_dir }}"
                       autocomplete="off" spellcheck="false">
                <button class="browse-btn" id="browseBtn" title="Seleccionar carpeta">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
            </div>
        </section>

        <!-- Banner de playlist -->
        <div class="playlist-banner" id="playlistBanner" hidden>
            <svg class="playlist-banner__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
            <span class="playlist-banner__title" id="playlistTitle"></span>
            <span class="playlist-banner__count" id="playlistCount"></span>
        </div>

        <!-- Resultados -->
        <section class="results" id="results"></section>

        <!-- Estado vacío / mensajes -->
        <div class="placeholder" id="placeholder">
            <p>Escribí algo arriba y presioná <kbd>Buscar</kbd>.</p>
        </div>
    </main>

    <!-- Barra de acción flotante -->
    <div class="actionbar" id="actionbar" hidden>
        <span class="actionbar__count" id="selectedCount">0 seleccionados</span>
        <button class="download-btn" id="downloadBtn">Descargar</button>
    </div>

    <!-- Panel de progreso -->
    <aside class="progress-panel" id="progressPanel" hidden>
        <div class="progress-panel__head">
            <h2>Descargas</h2>
            <button class="close-btn" id="closeProgress" aria-label="Cerrar">×</button>
        </div>
        <div class="progress-list" id="progressList"></div>
        <p class="progress-panel__dest" id="destNote"></p>
    </aside>

    <!-- Panel de historial -->
    <aside class="history-panel" id="historyPanel" hidden>
        <div class="history-panel__head">
            <h2>Historial</h2>
            <button class="close-btn" id="closeHistory" aria-label="Cerrar">×</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </aside>

    <!-- Toast de error -->
    <div class="toast" id="toast" hidden></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
